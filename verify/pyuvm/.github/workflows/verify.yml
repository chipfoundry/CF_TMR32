name: CF_TMR32 Verification

on:
  push:
    branches: [main]
    paths:
      - 'hdl/**'
      - 'verify/pyuvm/**'
  pull_request:
    branches: [main]
    paths:
      - 'hdl/**'
      - 'verify/pyuvm/**'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bus: [APB, AHB, WISHBONE]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Install Python dependencies
        working-directory: verify/pyuvm
        run: pip install -r requirements.txt

      - name: Run tests (${{ matrix.bus }})
        working-directory: verify/pyuvm
        run: python test_runner.py
        env:
          SIM: icarus
          BUSES: ${{ matrix.bus }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.bus }}
          path: verify/pyuvm/sim/
